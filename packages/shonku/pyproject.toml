[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shonku"
version = "0.1.2"
description = "Build, publish, and run AI agents as PyPI packages — wraps agno"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Kaustav", email = "kaustavsmailbox21@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = ["agents", "llm", "agno", "tools", "pypi"]
dependencies = [
    "agno>=2.0",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/kaustav1996/autoresearch-prompt-manager"
Repository = "https://github.com/kaustav1996/autoresearch-prompt-manager"

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
openai = ["openai>=1.30"]
groq = ["groq>=0.9"]
all = ["shonku[anthropic,openai,groq]"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
shonku = "shonku.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/shonku"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
