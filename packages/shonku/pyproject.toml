[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shonku"
version = "0.1.0"
description = "Build, publish, and run AI agents — a declarative wrapper over agno"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "agno>=2.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
openai = ["openai>=1.30"]
groq = ["groq>=0.9"]
all = ["shonku[anthropic,openai,groq]"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/shonku"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
