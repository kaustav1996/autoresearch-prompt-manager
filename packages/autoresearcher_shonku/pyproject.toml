[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autoresearcher-shonku"
version = "0.1.2"
description = "Autonomous prompt optimization agents — autoresearch loop built on shonku"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Kaustav", email = "kaustavsmailbox21@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = ["prompt", "optimization", "autoresearch", "agents", "llm"]
dependencies = [
    "shonku>=0.1.0",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/kaustav1996/autoresearch-prompt-manager"
Repository = "https://github.com/kaustav1996/autoresearch-prompt-manager"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/autoresearcher_shonku"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
