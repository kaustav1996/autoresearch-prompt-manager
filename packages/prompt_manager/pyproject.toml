[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prompt-manager"
version = "0.1.0"
description = "Application layer for prompt management: API, client SDK, and metric collection."
requires-python = ">=3.10"
dependencies = ["pydantic>=2.0", "pydantic-settings>=2.0"]

[project.optional-dependencies]
api = ["fastapi>=0.110", "uvicorn[standard]>=0.27", "asyncpg>=0.29", "httpx>=0.27"]
mcp = ["mcp>=1.0", "asyncpg>=0.29"]
client = ["httpx>=0.27"]
metric = ["httpx>=0.27"]
all = ["prompt-manager[api,client,metric,mcp]"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-httpx>=0.30", "httpx>=0.27"]

[project.scripts]
prompt-manager = "prompt_manager.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/prompt_manager"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
