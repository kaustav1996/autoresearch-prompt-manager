[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "support-agent-example"
version = "0.1.0"
description = "Example customer support agent demonstrating the full prompt-manager stack"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Kaustav", email = "kaustavsmailbox21@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
keywords = ["prompt", "support", "agents", "example", "autoresearch"]
dependencies = [
    "shonku>=0.1.0",
    "autoresearcher-shonku>=0.1.0",
    "autoresearch-prompt-manager[client,metric]>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/kaustav1996/autoresearch-prompt-manager"
Repository = "https://github.com/kaustav1996/autoresearch-prompt-manager"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
arpm-support = "support_agent.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/support_agent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
