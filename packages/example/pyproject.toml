[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "marketing-agent-example"
version = "0.1.0"
description = "Example marketing content agent demonstrating the full prompt-manager stack"
requires-python = ">=3.10"
dependencies = [
    "shonku>=0.1.0",
    "autoresearcher-shonku>=0.1.0",
    "arpm[client,metric]>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
arpm-example = "marketing_agent.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/marketing_agent"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
