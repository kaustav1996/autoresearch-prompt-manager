version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: prompt-manager-db
    environment:
      POSTGRES_USER: prompt_manager
      POSTGRES_PASSWORD: prompt_manager
      POSTGRES_DB: prompt_manager
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/prompt_manager/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompt_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
